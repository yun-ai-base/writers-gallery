<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Traditional Chinese seal stamp (印章) -->
  <rect x="4" y="4" width="40" height="40" rx="2" ry="2"
        fill="#c24a3a" stroke="#c24a3a" stroke-width="1"/>
  <!-- Inner border -->
  <rect x="8" y="8" width="32" height="32" rx="1" ry="1"
        fill="none" stroke="#f5f0e8" stroke-width="0.8" opacity="0.3"/>
  <!-- Character "文" (Literature) in seal script style -->
  <path d="M16,18 L32,18 M24,14 L24,34 M16,28 L32,28"
        stroke="#f5f0e8" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
</svg>
